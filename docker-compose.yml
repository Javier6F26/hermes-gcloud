services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes
    restart: unless-stopped
    command: ["/scripts/init-hermes.sh"]
    ports:
      - "8642:8642"
      - "9119:9119"
    volumes:
      - hermes_data:/opt/data
      - hermes_output:/output
      - ./scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_OUTPUT_DIR=/output
volumes:
  hermes_data:
  hermes_output:
